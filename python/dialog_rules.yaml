  An item named “%@” already exists in this location. Do you want to replace it with the one you are exporting?:
    en: An item named “%@” already exists in this location. Do you want to replace it with the one you are exporting?
    de: An diesem Ort existiert bereits ein Objekt mit dem Namen „%@“. Möchtest du es durch das zu exportierende Objekt ersetzen?
