  ? 'The last selected audio interface is not available.

    The previously selected interface “%@” will be used instead for this session.'
  : en: 'The last selected audio interface is not available.

      The previously selected interface “%@” will be used instead for this session.'
    de: 'Die zuletzt verwendete Audio-Schnittstelle ist nicht verfügbar.

      Für diese Sitzung wird stattdessen die zuvor ausgewählte Schnittstelle „%@“ verwendet.'
    es: 'La última interfaz de audio seleccionada no está disponible

      En su lugar se utilizará la interfaz de audio seleccionada anteriormente (%@) para esta sesión.'
    fr: 'La dernière interface audio sélectionnée n’est pas disponible.

      L’interface audio sélectionnée juste avant « %@ » sera utilisée pour cette session.'
    ja: '最後に選択したオーディオインターフェイスは現在使用できません。

      このセッションでは以前に選択したインターフェイス“%@”が使用されます。'
